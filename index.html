<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme = stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!--
      Analytics: sign up for a free account at https://www.goatcounter.com,
      then swap the data-goatcounter URL below for the code it gives you
      (it'll look like https://YOURCODE.goatcounter.com/count).
    -->
  <script data-goatcounter="https://kehlsey-portfolio.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <!--
      Static hidden form so Netlify's build-time HTML parser can detect the
      form fields -Netlify only scans plain HTML, not client-rendered React
      output. This form is never shown or submitted; the real one is in
      src/pages/Contact.tsx.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
